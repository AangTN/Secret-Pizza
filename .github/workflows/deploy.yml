name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-build:
    name: Validate Build Before Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend install, lint, build
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          npm run lint --if-present || true
          npm run build --if-present

      - name: Backend install and syntax check
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

          node --check server.js

      - name: Build backend image
        run: docker build -t secretpizza-backend:ci backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=http://localhost -t secretpizza-frontend:ci frontend

  deploy-vps:
    name: Deploy To VPS (Docker Compose + DB)
    runs-on: ubuntu-latest
    needs: validate-build

    steps:
      - name: Validate required secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          missing=0

          if [ -z "$VPS_HOST" ]; then
            echo "Missing secret: VPS_HOST"
            missing=1
          fi

          if [ -z "$VPS_USER" ]; then
            echo "Missing secret: VPS_USER"
            missing=1
          fi

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "Missing secret: VPS_SSH_KEY"
            missing=1
          fi

          if [ -z "$VPS_APP_DIR" ]; then
            echo "Missing secret: VPS_APP_DIR"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          # TRUYỀN CÁC BIẾN TỪ GITHUB SECRETS VÀO VPS
          envs: DATABASE_URL,MAPS_API_KEY,VNP_TMNCODE,VNP_HASH_SECRET,VNP_URL,VNP_API,VNP_RETURN_URL,FRONTEND_URL,EMAIL_USER,EMAIL_PASS,REFRESH_TOKEN,ACCESS_TOKEN,CLIENT_ID,CLIENT_SECRET,VITE_API_BASE_URL,VITE_MAP_KEY
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="${{ secrets.VPS_REPO_URL }}"

            if [ ! -d "$APP_DIR/.git" ]; then
              if [ -z "$REPO_URL" ]; then
                echo "VPS app dir is not a git repo and VPS_REPO_URL is missing"
                exit 1
              fi
              mkdir -p "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            # TẠO FILE .ENV TẠI ĐÂY (TRƯỚC KHI BUILD DOCKER)
            cat <<EOF > backend/.env
            DATABASE_URL="$DATABASE_URL"
            MAPS_API_KEY="$MAPS_API_KEY"
            VNP_TMNCODE="$VNP_TMNCODE"
            VNP_HASH_SECRET="$VNP_HASH_SECRET"
            VNP_URL="$VNP_URL"
            VNP_API="$VNP_API"
            VNP_RETURN_URL="$VNP_RETURN_URL"
            FRONTEND_URL="$FRONTEND_URL"
            EMAIL_USER="$EMAIL_USER"
            EMAIL_PASS="$EMAIL_PASS"
            REFRESH_TOKEN="$REFRESH_TOKEN"
            ACCESS_TOKEN="$ACCESS_TOKEN"
            CLIENT_ID="$CLIENT_ID"
            CLIENT_SECRET="$CLIENT_SECRET"
            EOF

            cat <<EOF > frontend/.env
            VITE_API_BASE_URL="$VITE_API_BASE_URL"
            VITE_MAP_KEY="$VITE_MAP_KEY"
            VITE_CLIENT_ID="$CLIENT_ID"
            EOF

            # CHẠY DOCKER COMPOSE MỚI
            docker compose pull db || true
            docker compose build --pull
            docker compose up -d --remove-orphans

            docker compose exec -T db sh -c 'until pg_isready -U postgres; do sleep 2; done'
            docker compose run --rm backend npx prisma migrate deploy

            docker image prune -f