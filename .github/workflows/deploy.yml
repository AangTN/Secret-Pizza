name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-build:
    name: Validate Build Before Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend install, lint, build
        working-directory: frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run lint --if-present || true
          npm run build --if-present

      - name: Backend install and syntax check
        working-directory: backend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          node --check server.js || echo "Skip syntax check"

      - name: Validate Dockerfiles
        run: |
          docker build -t test-backend ./backend --dry-run || true
          docker build -t test-frontend ./frontend --dry-run || true

  deploy-vps:
    name: Deploy To VPS (Docker Compose + DB)
    runs-on: ubuntu-latest
    needs: validate-build
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        # PHẦN QUAN TRỌNG: Map toàn bộ Secret vào môi trường của Action
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
          VNP_TMNCODE: ${{ secrets.VNP_TMNCODE }}
          VNP_HASH_SECRET: ${{ secrets.VNP_HASH_SECRET }}
          VNP_URL: ${{ secrets.VNP_URL }}
          VNP_API: ${{ secrets.VNP_API }}
          VNP_RETURN_URL: ${{ secrets.VNP_RETURN_URL }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
          FRONTEND_PORT: ${{ secrets.FRONTEND_PORT }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_MAP_KEY: ${{ secrets.VITE_MAP_KEY }}
          VITE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT != '' && secrets.VPS_PORT || '22' }}
          # Liệt kê lại các biến để Action truyền qua SSH
          envs: MAPS_API_KEY,VNP_TMNCODE,VNP_HASH_SECRET,VNP_URL,VNP_API,VNP_RETURN_URL,FRONTEND_URL,EMAIL_USER,EMAIL_PASS,REFRESH_TOKEN,ACCESS_TOKEN,CLIENT_ID,CLIENT_SECRET,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,DB_PORT,FRONTEND_PORT,VITE_API_BASE_URL,VITE_MAP_KEY,VITE_CLIENT_ID
          script_stop: true
          script: |
            set -e
            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            REPO_URL="${{ secrets.VPS_REPO_URL }}"

            POSTGRES_DB="${POSTGRES_DB:-secretpizza}"
            POSTGRES_USER="${POSTGRES_USER:-secretpizza}"
            POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-secretpizza}"
            DB_PORT="${DB_PORT:-5433}"
            FRONTEND_PORT="${FRONTEND_PORT:-8081}"
            DATABASE_URL="postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
            VITE_CLIENT_ID="${VITE_CLIENT_ID:-$CLIENT_ID}"

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$(dirname "$APP_DIR")"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git pull origin main

            # Root .env cho docker compose (db creds + build args)
            printf "POSTGRES_DB=\"%s\"\nPOSTGRES_USER=\"%s\"\nPOSTGRES_PASSWORD=\"%s\"\nDB_PORT=\"%s\"\nFRONTEND_PORT=\"%s\"\nDATABASE_URL=\"%s\"\nVITE_API_BASE_URL=\"%s\"\nVITE_MAP_KEY=\"%s\"\nVITE_CLIENT_ID=\"%s\"\n" \
              "$POSTGRES_DB" "$POSTGRES_USER" "$POSTGRES_PASSWORD" "$DB_PORT" "$FRONTEND_PORT" "$DATABASE_URL" "$VITE_API_BASE_URL" "$VITE_MAP_KEY" "$VITE_CLIENT_ID" > .env

            # Sử dụng printf để ghi file .env (Sạch sẽ, không dính rác hệ thống)
            printf "DATABASE_URL=\"%s\"\nMAPS_API_KEY=\"%s\"\nVNP_TMNCODE=\"%s\"\nVNP_HASH_SECRET=\"%s\"\nVNP_URL=\"%s\"\nVNP_API=\"%s\"\nVNP_RETURN_URL=\"%s\"\nFRONTEND_URL=\"%s\"\nEMAIL_USER=\"%s\"\nEMAIL_PASS=\"%s\"\nREFRESH_TOKEN=\"%s\"\nACCESS_TOKEN=\"%s\"\nCLIENT_ID=\"%s\"\nCLIENT_SECRET=\"%s\"\n" \
              "$DATABASE_URL" "$MAPS_API_KEY" "$VNP_TMNCODE" "$VNP_HASH_SECRET" "$VNP_URL" "$VNP_API" "$VNP_RETURN_URL" "$FRONTEND_URL" "$EMAIL_USER" "$EMAIL_PASS" "$REFRESH_TOKEN" "$ACCESS_TOKEN" "$CLIENT_ID" "$CLIENT_SECRET" > backend/.env

            printf "VITE_API_BASE_URL=\"%s\"\nVITE_MAP_KEY=\"%s\"\nVITE_CLIENT_ID=\"%s\"\n" \
              "$VITE_API_BASE_URL" "$VITE_MAP_KEY" "$VITE_CLIENT_ID" > frontend/.env

            # Cập nhật và khởi động lại Docker với Env mới
            docker compose pull db || true
            docker compose build --no-cache --pull
            docker compose up -d --remove-orphans

            # Chờ Database sẵn sàng và chạy Migration
            docker compose exec -T db sh -c 'until pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do sleep 2; done'
            docker compose run --rm backend npx prisma migrate deploy

            # Dọn dẹp các Image cũ để giải phóng ổ cứng VPS
            docker image prune -f