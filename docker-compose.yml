services:
  db:
    image: postgres:16-alpine
    container_name: secretpizza-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secretpizza}
      POSTGRES_USER: ${POSTGRES_USER:-secretpizza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpizza}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  db-seed:
    image: postgres:16-alpine
    container_name: secretpizza-db-seed
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-secretpizza}
      POSTGRES_USER: ${POSTGRES_USER:-secretpizza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secretpizza}
    volumes:
      - ./backend/cuahangpizza.sql:/seed/cuahangpizza.sql:ro
      - ./docker/db-seed-if-empty.sh:/seed/db-seed-if-empty.sh:ro
    entrypoint: ["/bin/sh", "/seed/db-seed-if-empty.sh"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: secretpizza-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-secretpizza}:${POSTGRES_PASSWORD:-secretpizza}@db:5432/${POSTGRES_DB:-secretpizza}}
    expose:
      - "3001"
    depends_on:
      db:
        condition: service_healthy
      db-seed:
        condition: service_completed_successfully
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend/public:/app/public
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
        VITE_MAP_KEY: ${VITE_MAP_KEY:-}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
        VITE_CLIENT_ID: ${VITE_CLIENT_ID:-}
    container_name: secretpizza-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-8081}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data: